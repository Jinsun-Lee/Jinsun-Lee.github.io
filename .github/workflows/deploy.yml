name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./avatar_3d_david
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: avatar_3d_david/package-lock.json

      - run: npm ci
      - run: npm run build

      - name: Assemble site (Claude at root, 3D app at /design.html)
        working-directory: ${{ github.workspace }}
        run: |
          rm -rf _site
          mkdir _site
          cp -r avatar_3d_david/dist/. _site/
          mv _site/index.html _site/design.html
          cp -r claude/. _site/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
