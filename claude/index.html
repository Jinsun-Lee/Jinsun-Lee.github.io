<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;500;600&family=Noto+Serif+KR:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <div class="brand-row">
          <a class="brand" href="#/">Claude</a>
          <div class="brand-actions">
            <button class="icon-btn" title="검색">
              <svg viewBox="0 0 24 24" width="18" height="18"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            </button>
            <button class="icon-btn" id="toggleSidebar" title="사이드바 닫기">
              <svg viewBox="0 0 24 24" width="18" height="18"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
            </button>
          </div>
        </div>
      </div>

      <div class="sidebar-scroll">
      <nav class="nav">
        <a class="nav-item" href="#/" data-route="home" data-tip="새 채팅">
          <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span>새 채팅</span>
        </a>
        <a class="nav-item" href="#" data-tip="채팅">
          <svg viewBox="0 0 24 24"><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></svg>
          <span>채팅</span>
        </a>
        <a class="nav-item" href="#" data-tip="프로젝트">
          <svg viewBox="0 0 24 24"><path d="M4 7a2 2 0 0 1 2-2h3l2 2h7a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2Z"/></svg>
          <span>프로젝트</span>
        </a>
        <a class="nav-item" href="#" data-tip="아티팩트">
          <svg viewBox="0 0 24 24"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>
          <span>아티팩트</span>
        </a>
        <a class="nav-item" href="#" data-tip="사용자 지정">
          <svg viewBox="0 0 24 24"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          <span>사용자 지정</span>
        </a>
      </nav>

      <div class="nav-label">제품</div>
      <nav class="nav">
        <a class="nav-item" href="#" data-tip="코드">
          <svg viewBox="0 0 24 24"><path d="m18 16 4-4-4-4"/><path d="m6 8-4 4 4 4"/><path d="m14.5 4-5 16"/></svg>
          <span>코드</span>
        </a>
        <a class="nav-item" href="#/design" data-route="design" data-tip="디자인">
          <svg viewBox="0 0 24 24"><path d="M12 2C6.5 2 2 6 2 11c0 4 3 7 7 7 1.1 0 2-.9 2-2 0-.5-.2-.9-.5-1.2-.3-.4-.5-.8-.5-1.3 0-1 .8-1.8 1.8-1.8H14c3.3 0 6-2.7 6-6 0-3.9-3.6-7-8-7Z"/><circle cx="6.5" cy="12" r="1.1"/><circle cx="9.5" cy="7.5" r="1.1"/><circle cx="14.5" cy="7.5" r="1.1"/></svg>
          <span>디자인</span>
        </a>
      </nav>

      <div class="nav-label">즐겨찾기</div>
      <nav class="nav" id="favList"></nav>

      <div class="nav-label recent">최근 항목</div>
      <nav class="nav" id="recentList"></nav>
      </div>

      <div class="sidebar-bottom">
        <div class="user-chip">
          <img class="spark-avatar" src="pink_octopus.jpg" alt="" aria-hidden="true" />
          <span class="user-text">
            <span class="user-name">진선</span>
            <span class="plan">맥스 플랜</span>
          </span>
        </div>
        <div class="user-actions">
          <button class="icon-btn" title="앱 및 확장 프로그램 받기" data-tip="앱 및 확장 프로그램 받기">
            <svg viewBox="0 0 24 24" width="16" height="16"><path d="M12 4v10"/><polyline points="8 11 12 15 16 11"/><line x1="5" y1="19" x2="19" y2="19"/></svg>
          </button>
          <button class="icon-btn" title="펼치기">
            <svg viewBox="0 0 24 24" width="16" height="16"><polyline points="8 9 12 5 16 9"/><polyline points="8 15 12 19 16 15"/></svg>
          </button>
        </div>
      </div>
    </aside>

    <div class="backdrop" id="backdrop"></div>

    <!-- Main -->
    <main class="main">
      <button class="mobile-toggle icon-btn" id="mobileToggle" title="사이드바 열기">
        <svg viewBox="0 0 24 24" width="20" height="20"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
      </button>
      <button class="help-btn icon-btn" title="시크릿 모드">
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M9 10h.01"/><path d="M15 10h.01"/><path d="M12 2a8 8 0 0 0-8 8v10l2.5-2 2.5 2 2.5-2 2.5 2 2.5-2 1.5 1.2V10a8 8 0 0 0-8-8Z"/></svg>
      </button>

      <section class="view" data-view="home">
      <div class="hero">
        <h1 class="greeting">
          <svg class="spark" viewBox="0 0 100 100" aria-hidden="true">
            <line x1="50" y1="50" x2="50" y2="12"/>
            <line x1="50" y1="50" x2="50" y2="12" transform="rotate(36 50 50)"/>
            <line x1="50" y1="50" x2="50" y2="12" transform="rotate(72 50 50)"/>
            <line x1="50" y1="50" x2="50" y2="12" transform="rotate(108 50 50)"/>
            <line x1="50" y1="50" x2="50" y2="12" transform="rotate(144 50 50)"/>
            <line x1="50" y1="50" x2="50" y2="12" transform="rotate(180 50 50)"/>
            <line x1="50" y1="50" x2="50" y2="12" transform="rotate(216 50 50)"/>
            <line x1="50" y1="50" x2="50" y2="12" transform="rotate(252 50 50)"/>
            <line x1="50" y1="50" x2="50" y2="12" transform="rotate(288 50 50)"/>
            <line x1="50" y1="50" x2="50" y2="12" transform="rotate(324 50 50)"/>
          </svg>
          <span id="greetingText">진선 님, 다시 오셨네요!</span>
        </h1>

        <div class="composer">
          <div class="composer-input" id="composerInput" contenteditable="true" data-placeholder="오늘 어떤 도움을 드릴까요?"></div>
          <div class="composer-bottom">
            <button class="icon-btn plus" title="추가">
              <svg viewBox="0 0 24 24" width="20" height="20"><line x1="12" y1="6" x2="12" y2="18"/><line x1="6" y1="12" x2="18" y2="12"/></svg>
            </button>
            <div class="composer-right">
              <button class="model-select">
                <span class="model-name">Opus 4.8</span>
                <span class="model-tier">High</span>
                <svg viewBox="0 0 24 24" width="14" height="14"><polyline points="6 9 12 15 18 9"/></svg>
              </button>
              <button class="icon-btn" title="음성">
                <svg viewBox="0 0 24 24" width="18" height="18"><rect x="9" y="3" width="6" height="12" rx="3"/><path d="M5 11a7 7 0 0 0 14 0"/><line x1="12" y1="18" x2="12" y2="21"/></svg>
              </button>
              <button class="icon-btn" title="오디오">
                <svg viewBox="0 0 24 24" width="18" height="18"><line x1="6" y1="9" x2="6" y2="15"/><line x1="10" y1="6" x2="10" y2="18"/><line x1="14" y1="8" x2="14" y2="16"/><line x1="18" y1="10" x2="18" y2="14"/></svg>
              </button>
            </div>
          </div>
        </div>

        <div class="chips">
          <button class="chip">
            <svg viewBox="0 0 24 24"><polyline points="3 17 9 11 13 15 21 7"/><polyline points="15 7 21 7 21 13"/></svg>
            전략 수립
          </button>
          <button class="chip">
            <svg viewBox="0 0 24 24"><path d="m18 16 4-4-4-4"/><path d="m6 8-4 4 4 4"/><path d="m14.5 4-5 16"/></svg>
            코드
          </button>
          <button class="chip">
            <svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
            작성하기
          </button>
          <button class="chip">
            <svg viewBox="0 0 24 24"><path d="M22 10 12 5 2 10l10 5 10-5Z"/><path d="M6 12v5c0 1 2.5 2.5 6 2.5s6-1.5 6-2.5v-5"/></svg>
            학습하기
          </button>
          <button class="chip">
            <svg viewBox="0 0 24 24"><path d="M5 11h14a0 0 0 0 1 0 0 7 7 0 0 1-7 7 7 7 0 0 1-7-7Z"/><line x1="12" y1="3" x2="12" y2="6"/></svg>
            일상생활
          </button>
        </div>
      </div>
      </section>

      <section class="view" data-view="chat" hidden>
        <div class="chat-header">
          <button class="chat-title-btn">
            <span id="chatHeaderTitle"></span>
            <svg viewBox="0 0 24 24" width="14" height="14"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <button class="chat-share" title="공유">
            <svg viewBox="0 0 24 24" width="15" height="15"><path d="M4 12v7a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-7"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
            공유
          </button>
        </div>
        <div class="chat-scroll" id="chatScroll">
          <div class="chat" id="chatThread"></div>
        </div>
        <div class="chat-composer">
          <div class="composer">
            <div class="composer-input" id="chatInput" contenteditable="true" data-placeholder="진선에게 무엇이든 물어보세요"></div>
            <div class="composer-bottom">
              <button class="icon-btn plus" title="추가">
                <svg viewBox="0 0 24 24" width="20" height="20"><line x1="12" y1="6" x2="12" y2="18"/><line x1="6" y1="12" x2="18" y2="12"/></svg>
              </button>
              <div class="composer-right">
                <button class="model-select">
                  <span class="model-name">Opus 4.8</span>
                  <span class="model-tier">High</span>
                  <svg viewBox="0 0 24 24" width="14" height="14"><polyline points="6 9 12 15 18 9"/></svg>
                </button>
                <button class="icon-btn" title="음성">
                  <svg viewBox="0 0 24 24" width="18" height="18"><rect x="9" y="3" width="6" height="12" rx="3"/><path d="M5 11a7 7 0 0 0 14 0"/><line x1="12" y1="18" x2="12" y2="21"/></svg>
                </button>
                <button class="icon-btn" title="오디오">
                  <svg viewBox="0 0 24 24" width="18" height="18"><line x1="6" y1="9" x2="6" y2="15"/><line x1="10" y1="6" x2="10" y2="18"/><line x1="14" y1="8" x2="14" y2="16"/><line x1="18" y1="10" x2="18" y2="14"/></svg>
                </button>
              </div>
            </div>
          </div>
        </div>
        <div class="chat-disclaimer">Claude인 척하지만 진선이 만들었습니다. 응답을 다시 한번 확인해 주세요.</div>
      </section>

      <section class="view" data-view="design" hidden>
        <iframe class="design-frame" id="designFrame" title="3D Avatar (David)" src="about:blank"></iframe>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
